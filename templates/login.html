<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAROKA — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1826;
  --navy-soft:#152233;
  --navy-mid:#1E3045;
  --teal:#00BFA5;
  --teal-dark:#00897B;
  --teal-glow:rgba(0,191,165,0.14);
  --teal-glow-strong:rgba(0,191,165,0.22);
  --text:#E4EAF0;
  --text-dim:#7A9AB5;
  --text-muted:#3E5870;
  --border:rgba(255,255,255,0.06);
  --border-mid:rgba(0,191,165,0.18);
  --red:#EF5350;
  --radius:10px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* Arrière-plan avec profondeur */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,191,165,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,137,123,0.06) 0%, transparent 50%);
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,191,165,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,191,165,0.025) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

.card{
  background:rgba(21,34,51,0.96);
  border:1px solid var(--border-mid);
  border-radius:22px;
  padding:44px 40px 40px;
  width:100%;
  max-width:400px;
  position:relative;
  z-index:1;
  box-shadow:
    0 0 0 1px rgba(0,191,165,0.06),
    0 24px 64px rgba(0,0,0,0.55),
    0 4px 16px rgba(0,0,0,0.3);
}

/* Ligne de couleur subtile en haut */
.card::before{
  content:'';
  position:absolute;
  top:0;left:16px;right:16px;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--teal),var(--teal-dark),transparent);
  border-radius:1px;
  opacity:0.7;
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:36px;
  justify-content:center;
}
.logo-mark{
  width:46px;height:46px;
  background:linear-gradient(145deg,var(--teal),var(--teal-dark));
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;
  color:white;
  letter-spacing:-0.5px;
  box-shadow:0 0 24px rgba(0,191,165,0.35),0 4px 12px rgba(0,0,0,0.3);
  flex-shrink:0;
}
.logo-text{font-size:23px;font-weight:700;letter-spacing:-0.3px;}
.logo-sub{
  font-size:10.5px;
  color:var(--text-dim);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:2px;
}

.heading-block{text-align:center;margin-bottom:30px;}
h2{font-size:19px;font-weight:600;letter-spacing:-0.2px;margin-bottom:6px;}
.subtitle{font-size:12.5px;color:var(--text-dim);line-height:1.5;}

.form-group{margin-bottom:18px;}
label{
  display:block;
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--text-dim);
  margin-bottom:7px;
  font-weight:500;
}
input{
  width:100%;
  background:rgba(11,24,38,0.8);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  padding:12px 15px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
input:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px var(--teal-glow);
  background:rgba(11,24,38,0.95);
}
input::placeholder{color:var(--text-muted);}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:var(--radius);
  background:linear-gradient(135deg,var(--teal-dark),var(--teal));
  color:white;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
  box-shadow:0 4px 20px rgba(0,191,165,0.28),0 1px 4px rgba(0,0,0,0.2);
  transition:opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  letter-spacing:0.1px;
}
.btn:hover{
  opacity:0.93;
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(0,191,165,0.36),0 2px 6px rgba(0,0,0,0.2);
}
.btn:active{transform:translateY(0);opacity:1;}

.error{
  background:rgba(239,83,80,0.1);
  border:1px solid rgba(239,83,80,0.25);
  color:var(--red);
  border-radius:var(--radius);
  padding:11px 15px;
  font-size:13px;
  margin-bottom:18px;
  text-align:center;
}

.footer{
  text-align:center;
  margin-top:28px;
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:0.5px;
}

/* Responsive */
@media(max-width:440px){
  .card{padding:36px 24px 32px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">K</div>
    <div><div class="logo-text">KAROKA</div><div class="logo-sub">Présences</div></div>
  </div>
  <div class="heading-block">
    <h2>Connexion</h2>
    <p class="subtitle">Accès réservé au personnel RH et à la Direction</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Identifiant</label>
      <input type="text" name="username" placeholder="rh ou pdg" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Se connecter</button>
  </form>
  <div class="footer">KAROKA — Système de présence interne</div>
</div>
</body>
</html>
