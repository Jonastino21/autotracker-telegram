<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAROKA | Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['DM Sans', 'sans-serif'],
          mono: ['DM Mono', 'monospace'],
        },
        colors: {
          navy: '#0B1826',
          'navy-soft': '#152233',
          'navy-mid': '#1E3045',
          teal: '#00BFA5',
          'teal-dark': '#00897B',
        },
        borderRadius: {
          card: '22px',
          input: '10px',
        },
      }
    }
  }
</script>
<style>
  /* ─── Fond : gradients + grille ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,191,165,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,137,123,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,191,165,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,191,165,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Liseré teal en haut de la carte ───────────────────────── */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 16px;
    right: 16px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00BFA5, #00897B, transparent);
    border-radius: 1px;
    opacity: 0.7;
  }

  /* ─── Inputs ────────────────────────────────────────────────── */
  input:focus {
    border-color: #00BFA5 !important;
    box-shadow: 0 0 0 3px rgba(0,191,165,0.14);
    background: rgba(11,24,38,0.95) !important;
    outline: none;
  }

  /* ─── Bouton submit ─────────────────────────────────────────── */
  .btn-submit {
    width: 100%;
    margin-top: 6px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.1px;
    background: linear-gradient(135deg, #00897B, #00BFA5);
    box-shadow: 0 4px 20px rgba(0,191,165,0.28), 0 1px 4px rgba(0,0,0,0.2);
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .btn-submit:hover:not(:disabled) {
    opacity: 0.93;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,191,165,0.36), 0 2px 6px rgba(0,0,0,0.2);
  }
  .btn-submit:active:not(:disabled) {
    transform: translateY(0);
    opacity: 1;
  }
  .btn-submit:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }
  /* Spinner de chargement */
  .btn-submit .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
  }
  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
</style>
</head>

<!--
  FIX 1 : body utilise min-h-[100dvh] (dynamic viewport height) pour éviter
           que le clavier virtuel mobile cache le bouton submit.
  FIX 2 : py-8 au lieu de p-5 pour avoir de l'air en haut/bas sur mobile.
  FIX 3 : overflow-y-auto pour permettre le scroll si nécessaire.
-->
<body class="font-sans bg-navy text-[#E4EAF0] min-h-[100dvh] flex items-center justify-center py-8 px-4 overflow-y-auto">

  <!--
    FIX 4 : w-full max-w-[400px] — la carte prend toute la largeur disponible
             (moins les px-4 du body, soit 16px de chaque côté) jusqu'à 400px max.
             Plus de débordement sur iPhone SE (320px) ou Android 360px.
    FIX 5 : padding interne adapté : px-6 sm:px-10 — réduit sur petits écrans.
  -->
  <div class="card relative z-10 w-full max-w-[400px]
              bg-[rgba(21,34,51,0.96)]
              border border-[rgba(0,191,165,0.18)]
              rounded-[22px]
              px-6 sm:px-10 pt-9 sm:pt-11 pb-8 sm:pb-10
              shadow-[0_0_0_1px_rgba(0,191,165,0.06),0_24px_64px_rgba(0,0,0,0.55),0_4px_16px_rgba(0,0,0,0.3)]">

    <!-- Logo -->
    <div class="flex items-center gap-[14px] mb-8 justify-center">
      <div class="w-[46px] h-[46px] flex-shrink-0 rounded-[13px] flex items-center justify-center text-[22px] font-extrabold text-white tracking-tight overflow-hidden">
        <!--
          FIX 6 : fallback texte si le logo ne charge pas (src relatif pour prod Flask,
                  fallback initiale "K" visible en prévisualisation statique).
        -->
        <img
          src="{{ url_for('static', filename='assets/logo.png') }}"
          alt="Logo KAROKA"
          width="46"
          height="46"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        >
        <span style="display:none; width:46px; height:46px; background:linear-gradient(135deg,#00897B,#00BFA5); border-radius:13px; align-items:center; justify-content:center; font-size:20px; font-weight:700;">K</span>
      </div>
      <div>
        <div class="text-[23px] font-bold tracking-tight">KAROKA</div>
        <div class="text-[10.5px] text-[#7A9AB5] tracking-[2px] uppercase mt-0.5">Présences</div>
      </div>
    </div>

    <!-- Titre -->
    <div class="text-center mb-7">
      <h1 class="text-[19px] font-semibold tracking-tight mb-1.5">Connexion</h1>
      <p class="text-[12.5px] text-[#7A9AB5] leading-relaxed">Accès réservé au personnel RH et à la Direction</p>
    </div>

    <!-- Bloc erreur Jinja2 -->
    {% if error %}
    <div
      role="alert"
      class="bg-[rgba(239,83,80,0.1)] border border-[rgba(239,83,80,0.25)] text-[#EF5350] rounded-[10px] px-[15px] py-[11px] text-[13px] mb-[18px] text-center"
    >
      {{ error }}
    </div>
    {% endif %}

    <!-- Formulaire -->
    <!--
      FIX 7 : action explicite pour la maintenabilité.
      FIX 8 : novalidate pour gérer la validation côté serveur (Flask) sans pop-ups navigateur.
    -->
    <form method="POST" action="{{ url_for('login') }}" novalidate id="login-form">

      <!-- Identifiant -->
      <div class="mb-[18px]">
        <!--
          FIX 9 : for="username" lié à id="username" → accessibilité lecteurs d'écran,
                  clic sur label focus le champ.
        -->
        <label for="username" class="block text-[10.5px] uppercase tracking-[1px] text-[#7A9AB5] mb-[7px] font-medium">
          Identifiant
        </label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Votre identifiant"
          autocomplete="username"
          autofocus
          required
          aria-required="true"
          class="w-full bg-[rgba(11,24,38,0.8)] border border-[rgba(255,255,255,0.08)] rounded-[10px] px-[15px] py-3 text-[#E4EAF0] text-[14px] font-sans placeholder-[#3E5870] transition-[border-color,box-shadow,background] duration-200"
        >
      </div>

      <!-- Mot de passe -->
      <div class="mb-[18px]">
        <label for="password" class="block text-[10.5px] uppercase tracking-[1px] text-[#7A9AB5] mb-[7px] font-medium">
          Mot de passe
        </label>
        <!--
          FIX 10 : wrapper relatif pour le bouton "voir mot de passe"
        -->
        <div class="relative">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            aria-required="true"
            class="w-full bg-[rgba(11,24,38,0.8)] border border-[rgba(255,255,255,0.08)] rounded-[10px] px-[15px] pr-11 py-3 text-[#E4EAF0] text-[14px] font-sans placeholder-[#3E5870] transition-[border-color,box-shadow,background] duration-200"
          >
          <!-- Bouton afficher/masquer le mot de passe -->
          <button
            type="button"
            id="toggle-password"
            aria-label="Afficher le mot de passe"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-[#3E5870] hover:text-[#7A9AB5] transition-colors duration-150 p-1"
          >
            <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        id="btn-submit"
        class="btn-submit"
        aria-label="Se connecter"
      >
        <span class="btn-text">Se connecter</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
    </form>

    <!-- Footer -->
    <div class="text-center mt-7 text-[11px] text-[#3E5870] tracking-[0.5px]">
      KAROKA — Système de présence interne
    </div>

  </div>

  <script>
    // ── Afficher / masquer le mot de passe ────────────────────────
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    const iconEye = document.getElementById('icon-eye');
    const iconEyeOff = document.getElementById('icon-eye-off');

    toggleBtn.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      iconEye.style.display    = isHidden ? 'none'  : 'block';
      iconEyeOff.style.display = isHidden ? 'block' : 'none';
      toggleBtn.setAttribute('aria-label', isHidden ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
    });

    // ── État de chargement au submit ──────────────────────────────
    // FIX 11 : empêche les doubles soumissions, donne un feedback visuel.
    const form   = document.getElementById('login-form');
    const btn    = document.getElementById('btn-submit');

    form.addEventListener('submit', () => {
      btn.disabled = true;
      btn.classList.add('loading');
    });

    // ── Scroll vers le bouton quand le clavier virtuel s'ouvre ────
    // FIX 12 : sur mobile, déplacer le scroll pour que le bouton reste visible.
    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('focus', () => {
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', scrollToBtnIfNeeded, { once: true });
        }
      });
    });

    function scrollToBtnIfNeeded() {
      setTimeout(() => {
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 150);
    }
  </script>

</body>
</html>
