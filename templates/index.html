<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAROKA | Dashboard Présences</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo.png') }}">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<!-- TODO PROD : remplacer par un build Tailwind purgé (npm run build) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['DM Sans', 'sans-serif'],
          mono: ['DM Mono', 'monospace'],
        },
        colors: {
          'sidebar-bg':   '#1A1F2E',
          'main-bg':      '#F0F2F8',
          'main-bg2':     '#E8EBF4',
          teal:           '#00BFA5',
          'teal-dark':    '#00897B',
          amber:          '#FFB300',
          red:            '#EF5350',
          green:          '#4CAF50',
          purple:         '#9C27B0',
          slate:          '#607D8B',
          'navy-mid':     '#2A3347',
          'text-main':    '#1A1F2E',
          'text-dim':     '#5A6A82',
          'text-muted':   '#9AAABB',
          'sidebar-text': '#E8EDF2',
          'sidebar-muted':'#7B8BA8',
        },
        borderRadius: { card: '18px', input: '12px' },
        keyframes: {
          pulse:   { '0%,100%': { opacity:'1', transform:'scale(1)' }, '50%': { opacity:'0.3', transform:'scale(0.6)' } },
          spin:    { to: { transform:'rotate(360deg)' } },
          modalIn: { from: { opacity:'0', transform:'scale(0.96) translateY(10px)' }, to: { opacity:'1', transform:'none' } },
        },
        animation: {
          pulse:   'pulse 1.5s infinite',
          spin:    'spin 0.8s linear infinite',
          modalIn: 'modalIn 0.2s ease',
        },
      }
    }
  }
</script>
<style>
  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

  /* ── stat-card top accent lines ── */
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 18px 18px 0 0;
  }
  .stat-card.total::before    { background: linear-gradient(90deg, #00BFA5, #00897B); }
  .stat-card.complet::before  { background: linear-gradient(90deg, #4CAF50, #388E3C); }
  .stat-card.incomplet::before{ background: linear-gradient(90deg, #FFB300, #F57F17); }
  .stat-card.absent::before   { background: linear-gradient(90deg, #EF5350, #C62828); }

  /* ── Native date input ── */
  input[type="date"] { background: transparent; border: none; color: #00BFA5; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; cursor: pointer; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4) sepia(1) hue-rotate(130deg); cursor: pointer; }

  /* ── Table hover rows ── */
  .data-table tr:hover td { background: rgba(0,191,165,0.04); }
  .periode-table td:hover { filter: brightness(0.95); cursor: pointer; }
  .smois-week-row:hover td { background: rgba(0,191,165,0.06); }

  /* ── Smois toggle ── */
  .smois-toggle { font-size: 10px; color: #00BFA5; margin-left: 6px; display: inline-block; transition: transform 0.2s; }
  .smois-toggle.open { transform: rotate(90deg); }
  .smois-detail-row { display: none; }
  .smois-detail-row.open { display: table-row; }

  /* ── Modal animation ── */
  .modal-overlay.open { display: flex; }

  /* ── Toast animation ── */
  .toast-item { transform: translateX(120px); opacity: 0; transition: all 0.3s; }
  .toast-item.show { transform: none; opacity: 1; }

  /* ── FIX 3 : Sidebar mobile — cachée sous 768px, overlay hamburger ── */
  #sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(2px); z-index: 40;
  }
  #sidebar-overlay.open { display: block; }
  #hamburger { display: none; }
  @media (max-width: 767px) {
    /* Sidebar : fixée hors écran, slide-in à l'ouverture
       Le !important écrase le max-[900px]:w-16 de Tailwind */
    #sidebar {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      height: 100dvh !important;
      width: 220px !important;
      min-height: 100dvh !important;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    #sidebar.open { transform: translateX(0) !important; }
    /* Réafficher le texte du logo et la nav masqués par max-[900px]:hidden */
    #sidebar .max-\[900px\]\:hidden { display: block !important; }
    #sidebar nav a .max-\[900px\]\:hidden { display: inline !important; }
    #sidebar nav a.max-\[900px\]\:justify-center { justify-content: flex-start !important; }
    #sidebar nav a.max-\[900px\]\:px-3 { padding-left: 14px !important; padding-right: 14px !important; }
    #hamburger { display: flex; }
    .main-content { margin-left: 0 !important; }

    /* Topbar mobile : 2 lignes propres */
    .topbar-row1 { display: flex; align-items: center; gap: 10px; width: 100%; }
    .topbar-row2 { display: flex; align-items: center; gap: 8px; width: 100%; flex-wrap: wrap; }
  }
  @media (min-width: 768px) {
    #hamburger { display: none !important; }
    #sidebar-close { display: none !important; }
  }

  /* ── FIX 5 : Tabs — scroll horizontal sur petit écran ── */
  .tabs-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs-scroll::-webkit-scrollbar { display: none; }

  /* ── FIX 6 : Stats — tabular nums, pas de layout shift ── */
  .stat-number { font-variant-numeric: tabular-nums; min-height: 44px; }

  /* ── FIX 7 : Modal accessibilité ── */
  .modal-overlay { display: none; }
  .modal-overlay.open { display: flex; }

  /* ── FIX 8 : Toast safe area mobile ── */
  #toast { bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }

  /* ══ Styles pour HTML injecté par JS (déplacés depuis body) ══ */

  /* Data table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    background: #F0F2F8; color: #5A6A82; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 14px;
    text-align: left; white-space: nowrap; border-bottom: 1px solid rgba(0,0,0,0.07);
  }
  .data-table td {
    padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.07);
    font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; color: #1A1F2E;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .td-name  { font-family: 'DM Sans', sans-serif !important; font-weight: 500; color: #1A1F2E; }
  .td-prno  { color: #00BFA5; font-weight: 600; }
  .td-time  { color: #1A1F2E; }
  .td-empty { color: #9AAABB; }
  .td-dur   { color: #5A6A82; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px;
  }
  .badge-complet  { background: rgba(76,175,80,0.12);  color: #2E7D32;  border: 1px solid rgba(76,175,80,0.3);  }
  .badge-incomplet{ background: rgba(255,179,0,0.12);  color: #E65100;  border: 1px solid rgba(255,179,0,0.3);  }
  .badge-absent   { background: rgba(239,83,80,0.10);  color: #C62828;  border: 1px solid rgba(239,83,80,0.3);  }
  .badge-ferie    { background: rgba(156,39,176,0.10); color: #6A1B9A;  border: 1px solid rgba(156,39,176,0.3); }
  .badge-exclu    { background: rgba(96,125,139,0.04); color: #607D8B;  border: 1px solid rgba(96,125,139,0.2); }
  .badge-repos    { background: rgba(33,150,243,0.08); color: #1565C0;  border: 1px solid rgba(33,150,243,0.3); }
  .badge-garde    { background: rgba(0,150,136,0.10);  color: #00695C;  border: 1px solid rgba(0,150,136,0.3);  }
  .badge-recup    { background: rgba(121,134,203,0.12); color: #3949AB;  border: 1px solid rgba(121,134,203,0.3); }

  /* Toast notifications */
  #toastContainer { position:fixed; top:20px; right:20px; z-index:99999; display:flex; flex-direction:column; align-items:flex-end; gap:8px; pointer-events:none; }
  .toast-card { background:#fff; border-radius:10px; padding:12px 18px; box-shadow:0 4px 24px rgba(0,0,0,0.13); font-size:13px; color:#1A1F2E; max-width:340px; min-width:220px; border-left:3px solid #ccc; pointer-events:all; opacity:1; transition:opacity 0.3s, transform 0.3s; transform:translateX(0); }
  .toast-card.hide { opacity:0; transform:translateX(20px); }
  .toast-success { border-left-color:#4CAF50; }
  .toast-error   { border-left-color:#EF5350; }
  .toast-info    { border-left-color:#00BFA5; }
  .toast-warning { border-left-color:#FFB300; }

  /* Tables responsives */
  .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:inherit; }
  @media (max-width:640px) {
    table th, table td { padding:8px 10px !important; font-size:11px !important; }
    .btn-sm { padding:4px 8px !important; font-size:10px !important; }
    td[style*="display:flex"] { flex-wrap:wrap; }
  }

  /* Période table */
  .periode-scroll { overflow-x: auto; }
  .periode-table  { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .periode-table th {
    background: #F0F2F8; color: #5A6A82; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px; padding: 8px 10px;
    border: 1px solid rgba(0,0,0,0.07); white-space: nowrap; cursor: pointer; text-align: center;
  }
  .periode-table th:hover { color: #00BFA5; }
  .periode-table th.th-ferie { background: rgba(156,39,176,0.08); color: #9C27B0; }
  .periode-table td { border: 1px solid rgba(0,0,0,0.07); padding: 7px 8px; text-align: center; font-size: 11px; transition: filter 0.15s; }
  .td-prno-col {
    font-family: 'DM Mono', monospace; color: #00BFA5; font-weight: 500; font-size: 11px;
    text-align: left; padding-left: 14px; background: #F0F2F8; white-space: nowrap;
  }
  .td-nom-col {
    font-family: 'DM Sans', sans-serif; color: #1A1F2E; font-weight: 500;
    text-align: left; padding-left: 10px; background: #F0F2F8; white-space: nowrap; min-width: 140px;
  }
  .cel-complet  { background: rgba(76,175,80,0.14);  color: #2E7D32;  font-weight: 600; }
  .cel-incomplet{ background: rgba(255,179,0,0.14);  color: #E65100;  font-weight: 600; }
  .cel-absent   { background: rgba(239,83,80,0.10);  color: #C62828;  font-weight: 600; }
  .cel-ferie    { background: rgba(156,39,176,0.10); color: #6A1B9A;  font-weight: 600; }
  .cel-exclu    { background: rgba(96,125,139,0.04); color: #9AAABB;  font-size: 10px;  }
  .cel-repos    { background: rgba(33,150,243,0.08); color: #1565C0;  font-weight: 600; }
  .cel-garde    { background: rgba(0,150,136,0.12);  color: #00695C;  font-weight: 700; }
  .cel-recup    { background: rgba(121,134,203,0.12); color: #3949AB;  font-weight: 600; }

  /* Loading / spinner */
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; color: #5A6A82; }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.07); border-top-color: #00BFA5; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Ferie banner */
  .ferie-banner {
    background: rgba(156,39,176,0.07); border: 1px solid rgba(156,39,176,0.25);
    border-radius: 12px; padding: 10px 16px; margin: 12px 16px 0;
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: #6A1B9A;
  }

  /* Toast item */
  .toast-item {
    background: white; border: 1px solid rgba(0,0,0,0.07); border-radius: 12px;
    padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px;
    pointer-events: none; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .toast-item.pointage { border-left: 3px solid #00BFA5; }
  .toast-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #00897B, #00BFA5);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .toast-content { flex: 1; }
  .toast-name   { font-weight: 600; color: #1A1F2E; font-size: 13px; }
  .toast-detail { font-size: 11px; color: #5A6A82; margin-top: 2px; }
</style>
</head>
<body class="font-sans bg-[#F0F2F8] text-[#1A1F2E] min-h-screen flex overflow-x-hidden">
<div id="toastContainer"></div>

<!-- FIX 3 : Overlay mobile pour fermer la sidebar -->
<div id="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

<!-- ══════════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════════ -->
<aside id="sidebar"
       class="w-[220px] min-h-screen bg-[#1A1F2E] flex flex-col flex-shrink-0 sticky top-0 h-screen overflow-y-auto py-7
              max-[900px]:w-16"
       aria-label="Navigation principale">

  <!-- Logo + bouton fermer (mobile) -->
  <div class="flex items-center gap-2.5 px-6 pb-7">
    <!--
      FIX logo : fallback textuel si url_for échoue (aperçu statique)
    -->
    <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo KAROKA"
         class="w-[38px] h-[38px] object-contain flex-shrink-0"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <span style="display:none;width:38px;height:38px;background:linear-gradient(135deg,#00897B,#00BFA5);border-radius:10px;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0;">K</span>
    <div class="max-[900px]:hidden flex-1">
      <div class="text-[17px] font-bold text-[#E8EDF2]">KAROKA</div>
      <div class="text-[10px] text-[#7B8BA8] tracking-[1.5px] uppercase">Présences</div>
    </div>
    <!-- Bouton ✕ visible uniquement sur mobile quand sidebar ouverte -->
    <button onclick="closeSidebar()"
            class="hidden ml-auto text-[#7B8BA8] hover:text-white transition-colors p-1 rounded-lg hover:bg-white/10"
            id="sidebar-close" aria-label="Fermer le menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex flex-col gap-0.5 px-3 flex-1" aria-label="Menu">
    <div class="text-[9px] font-bold tracking-[1.8px] uppercase text-[#7B8BA8] px-3.5 pt-3.5 pb-1.5 opacity-70 max-[900px]:hidden" aria-hidden="true">Présence</div>
    <a href="/" aria-label="Tableau de bord"
       class="flex items-center gap-2.5 px-3.5 py-2.5 rounded-[10px] text-[13px] font-semibold text-white bg-white/10 no-underline transition-all duration-200
              max-[900px]:justify-center max-[900px]:px-3">
      <span class="text-[15px] w-5 text-center flex-shrink-0" aria-hidden="true">◉</span>
      <span class="max-[900px]:hidden">Tableau de bord</span>
    </a>
    <div class="text-[9px] font-bold tracking-[1.8px] uppercase text-[#7B8BA8] px-3.5 pt-3.5 pb-1.5 opacity-70 max-[900px]:hidden" aria-hidden="true">Liaison</div>
    <a href="/admin" aria-label="Administration"
       class="flex items-center gap-2.5 px-3.5 py-2.5 rounded-[10px] text-[13px] font-medium text-[#7B8BA8] no-underline transition-all duration-200 hover:text-white hover:bg-white/[0.07]
              max-[900px]:justify-center max-[900px]:px-3">
      <span class="text-[15px] w-5 text-center flex-shrink-0" aria-hidden="true">◎</span>
      <span class="max-[900px]:hidden">Administration</span>
    </a>
  </nav>

  <!-- Footer sidebar -->
  <div class="px-3 pt-4 border-t border-white/[0.07] mt-auto flex flex-col gap-1.5">
    <a href="/help" aria-label="Manuel d'utilisation"
       class="flex items-center gap-2.5 px-3.5 py-2.5 rounded-[10px] text-[13px] font-medium text-[#7B8BA8] no-underline transition-all duration-200 hover:text-white hover:bg-white/[0.07]
              max-[900px]:justify-center max-[900px]:px-3">
      <span class="text-[15px] w-5 text-center flex-shrink-0" aria-hidden="true">?</span>
      <span class="max-[900px]:hidden">Manuel</span>
    </a>
    <a href="/logout" aria-label="Se déconnecter"
       class="flex items-center gap-2.5 px-3.5 py-2.5 rounded-[10px] text-[13px] font-medium text-[#7B8BA8] no-underline transition-all duration-200 hover:text-white hover:bg-white/[0.07]
              max-[900px]:justify-center max-[900px]:px-3">
      <span class="text-[15px] w-5 text-center flex-shrink-0" aria-hidden="true">←</span>
      <span class="max-[900px]:hidden">Déconnexion</span>
    </a>
  </div>
</aside>

<!-- ══════════════════════════════════════════════
     PAGE BODY
══════════════════════════════════════════════ -->
<div class="flex-1 flex flex-col min-w-0 main-content">

  <!-- TOPBAR : flex-col sur mobile, flex-row sur desktop -->
  <div class="flex flex-col gap-2 px-4 pt-4 flex-shrink-0 sm:flex-row sm:items-center sm:px-7 sm:pt-5 sm:gap-3 sm:flex-wrap">

    <!-- Ligne 1 mobile : hamburger + titre -->
    <div class="flex items-center gap-3 w-full sm:w-auto sm:flex-1 sm:min-w-0">
      <!-- Hamburger (mobile uniquement) -->
      <button id="hamburger"
              onclick="openSidebar()"
              class="flex-shrink-0 w-9 h-9 rounded-[10px] bg-[#1A1F2E] text-white flex items-center justify-center hover:bg-[#2A3347] transition-colors"
              aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="text-[22px] font-bold text-[#1A1F2E]">Présences</div>
    </div>

    <!-- Bannière relevé (pleine largeur quand visible) -->
    <div id="releveBanner"
         class="hidden items-center gap-2 bg-[rgba(0,191,165,0.08)] border border-[rgba(0,191,165,0.25)] rounded-[10px] px-3.5 py-1.5 text-[12px] text-teal w-full sm:flex-1 sm:max-w-[380px]"
         role="status">
      <span class="font-bold" aria-hidden="true">◉</span>
      <span id="releveBannerText" class="font-mono text-[11px] flex-1"></span>
      <button onclick="clearReleve()"
              class="bg-transparent border border-[rgba(0,191,165,0.4)] rounded-md text-teal text-[10px] px-1.5 py-0.5 cursor-pointer whitespace-nowrap hover:bg-[rgba(0,191,165,0.1)] transition-colors"
              aria-label="Désactiver le relevé actif">
        ✕ Désactiver
      </button>
    </div>

    <!-- Ligne 2 mobile : relevé + date + excel -->
    <div class="flex items-center gap-2 w-full sm:w-auto sm:contents flex-wrap">

      <!-- Sélecteur relevé -->
      <div id="releveSelectorWrap"
           class="hidden items-center gap-2 bg-white border border-[rgba(0,191,165,0.45)] rounded-[12px] px-3.5 py-[7px] shadow-[0_0_0_3px_rgba(0,191,165,0.08),0_2px_12px_rgba(0,0,0,0.07)] flex-1 sm:flex-initial
                  hover:border-teal hover:shadow-[0_0_0_4px_rgba(0,191,165,0.15),0_2px_12px_rgba(0,0,0,0.07)] transition-all duration-200">
        <label for="releveSelector" class="sr-only">Choisir un relevé</label>
        <select id="releveSelector" onchange="onReleveChange(this.value)"
                class="bg-transparent border-none text-teal font-mono text-[12px] outline-none w-full sm:max-w-[200px] cursor-pointer">
          <option value="">Choisir un relevé</option>
        </select>
      </div>

      <!-- Date picker -->
      <div class="flex items-center gap-2 bg-white border border-[rgba(0,191,165,0.45)] rounded-[12px] px-3.5 py-[7px] shadow-[0_0_0_3px_rgba(0,191,165,0.08),0_2px_12px_rgba(0,0,0,0.07)] cursor-pointer relative flex-1 sm:flex-initial
                  hover:border-teal hover:shadow-[0_0_0_4px_rgba(0,191,165,0.15),0_2px_12px_rgba(0,0,0,0.07)] transition-all duration-200"
           role="button" tabindex="0" aria-label="Sélectionner une date"
           onclick="document.getElementById('nativeDatePicker').showPicker ? document.getElementById('nativeDatePicker').showPicker() : document.getElementById('nativeDatePicker').click()"

<script>
// ── Toast notifications ────────────────────────────────────────────────────
function showToast(type, message) {
  const c = document.getElementById('toastContainer');
  if (!c) return;
  const t = document.createElement('div');
  t.className = `toast-card toast-${type}`;
  t.textContent = message;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 320); }, 4500);
}

// ── Sidebar mobile ────────────────────────────────────────────────────────
function openSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const hamburger = document.getElementById('hamburger');
  const closeBtn = document.getElementById('sidebar-close');
  sidebar.classList.add('open');
  overlay.classList.add('open');
  hamburger.setAttribute('aria-expanded', 'true');
  if (closeBtn) closeBtn.style.display = 'flex';
  sidebar.querySelector('nav a')?.focus();
}

function closeSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const hamburger = document.getElementById('hamburger');
  const closeBtn = document.getElementById('sidebar-close');
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  hamburger.setAttribute('aria-expanded', 'false');
  if (closeBtn) closeBtn.style.display = 'none';
  hamburger.focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('sidebar')?.classList.contains('open')) {
    closeSidebar();
  }
});

const socket = io();

let currentTab = 'jour';
const todayStr = '{{ today }}';
let currentDate = '{{ date_param }}' || todayStr;
if (!currentDate || currentDate === 'None' || currentDate === '') currentDate = todayStr;
let allRowsData = [];

function toDisplayDate(iso) { return iso ? iso.replace(/-/g, '/') : ''; }
function toISODate(disp)    { return disp ? disp.replace(/\//g, '-') : ''; }

function setDateDisplay(iso) {
  const disp = toDisplayDate(iso);
  const el = document.getElementById('globalDate');
  if (el) el.textContent = disp;
  const picker = document.getElementById('nativeDatePicker');
  if (picker) picker.value = iso;
}

function onNativeDateChange(iso) {
  if (!iso) return;
  currentDate = iso;
  history.replaceState(null, '', `?date=${iso}`);
  setDateDisplay(iso);
  loadData();
  loadStats();
}

setDateDisplay(currentDate);

const urlParams = new URLSearchParams(window.location.search);
const dateParam = urlParams.get('date');
if (dateParam) {
  currentDate = dateParam;
  setDateDisplay(dateParam);
  setTimeout(() => openModal(dateParam), 600);
}

const JOURS_ABRV = ['lu','ma','me','je','ve','sa','di'];
function formatDateCourt(ds) {
  const d = new Date(ds + 'T12:00:00');
  const j = d.getDay() === 0 ? 6 : d.getDay() - 1;
  return `${JOURS_ABRV[j]} ${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getDate()).padStart(2,'0')}`;
}

// ── WebSocket ──────────────────────────────────────────────────────────────
socket.on('nouveau_pointage', function(data) {
  showPointageToast(data);
  if (currentTab === 'jour' && data.date === currentDate) { loadData(); loadStats(); }
  playBeep();
});

function showPointageToast(data) {
  const container = document.getElementById('toast');
  const icon = data.type_pointage === 'arrivee' ? '▲' : '▼';
  const initials = data.nom_complet.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const div = document.createElement('div');
  div.className = 'toast-item pointage';
  div.innerHTML = `<div class="toast-avatar">${initials}</div><div class="toast-content"><div class="toast-name">${data.nom_complet}</div><div class="toast-detail">${icon} ${data.type_label} ${data.session_label} — ${data.heure}</div></div>`;
  container.appendChild(div);
  setTimeout(() => div.classList.add('show'), 50);
  setTimeout(() => { div.classList.remove('show'); setTimeout(() => div.remove(), 400); }, 4000);
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// ── Relevé ────────────────────────────────────────────────────────────────
let activeReleveId = null;

async function loadTopbarReleves() {
  try {
    const releves = await (await fetch('/api/releves')).json();
    const sel  = document.getElementById('releveSelector');
    const wrap = document.getElementById('releveSelectorWrap');
    if (!releves.length) return;
    wrap.style.display = 'flex';
    while (sel.options.length > 1) sel.remove(1);
    releves.forEach(r => {
      const opt   = document.createElement('option');
      opt.value   = r.id;
      const debut = (r.date_debut||'').replace(/-/g,'/');
      const fin   = (r.date_fin  ||'').replace(/-/g,'/');
      opt.textContent = `${r.libelle || 'Relevé #'+r.id} (${debut}→${fin})`;
      if (r.clos === 0) opt.style.fontWeight = '600';
      sel.appendChild(opt);
    });
    const actif = await (await fetch('/api/releves/actif')).json();
    if (actif && actif.id) {
      sel.value     = actif.id;
      activeReleveId = actif.id;
      showReleveBanner(actif);
    }
  } catch(e) {}
}

function onReleveChange(val) {
  activeReleveId = val ? parseInt(val) : null;
  if (!activeReleveId) { hideReleveBanner(); loadData(); return; }
  fetch(`/api/releves`).then(r=>r.json()).then(releves => {
    const r = releves.find(x => x.id === activeReleveId);
    if (r) showReleveBanner(r);
  });
  loadData();
}

function showReleveBanner(r) {
  const banner = document.getElementById('releveBanner');
  const text   = document.getElementById('releveBannerText');
  if (!banner || !text) return;
  const debut = (r.date_debut||'').replace(/-/g,'/');
  const fin   = (r.date_fin  ||'').replace(/-/g,'/');
  text.textContent = `${r.libelle || 'Relevé #'+r.id}  ${debut} → ${fin}`;
  banner.classList.remove('hidden');
  banner.classList.add('flex');
}

function hideReleveBanner() {
  const banner = document.getElementById('releveBanner');
  if (!banner) return;
  banner.classList.add('hidden');
  banner.classList.remove('flex');
}

function clearReleve() {
  activeReleveId = null;
  document.getElementById('releveSelector').value = '';
  hideReleveBanner();
  loadData();
}

// ── Classes tab active/inactif (source unique de vérité) ─────────────────
const TAB_ACTIVE   = 'active bg-gradient-to-br from-[#00897B] to-teal text-white font-semibold shadow-[0_2px_12px_rgba(0,191,165,0.3)] border-none font-sans text-[13px] px-[18px] py-2 rounded-[10px] cursor-pointer transition-all duration-200 whitespace-nowrap';
const TAB_INACTIVE = 'border-none font-sans text-[13px] font-medium px-[18px] py-2 rounded-[10px] cursor-pointer transition-all duration-200 whitespace-nowrap text-[#5A6A82] bg-transparent hover:text-[#1A1F2E] hover:bg-black/[0.05]';

function switchTab(tab) {
  currentTab = tab;
  const tabs = ['jour','semaine','s_mois','mois'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const active = tabs[i] === tab;
    b.className = 'tab-btn ' + (active ? TAB_ACTIVE : TAB_INACTIVE);
    b.setAttribute('aria-selected', active);
  });

  const wrap = document.getElementById('releveSelectorWrap');
  if (wrap) {
    const showReleve = (tab === 's_mois' || tab === 'mois');
    wrap.style.display = showReleve ? 'flex' : 'none';
    if (!showReleve && activeReleveId) {
      activeReleveId = null;
      hideReleveBanner();
      document.getElementById('releveSelector').value = '';
    }
  }
  loadData();
}

async function loadData() {
  document.getElementById('tableBody').innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Chargement...</span></div>';
  try {
    if      (currentTab === 'jour')    await loadJour();
    else if (currentTab === 'semaine') await loadPeriode();
    else if (currentTab === 's_mois')  await loadSMois();
    else if (currentTab === 'mois')    await loadPeriode();
  } catch(e) {
    document.getElementById('tableBody').innerHTML = '<div class="loading-state">Erreur de chargement</div>';
  }
}

async function loadStats() {
  try {
    const d = await (await fetch(`/api/stats?date=${currentDate}`)).json();
    document.getElementById('statTotal').textContent      = d.total      ?? '';
    document.getElementById('statComplets').textContent   = d.complets   ?? '';
    document.getElementById('statIncomplets').textContent = d.incomplets ?? '';
    document.getElementById('statAbsents').textContent    = d.absents    ?? '';
  } catch(e) {}
}

// ── VUE JOUR ──────────────────────────────────────────────────────────────
async function loadJour() {
  const data = await (await fetch(`/api/jour_horaires?date=${currentDate}`)).json();
  allRowsData = data;
  const dt = new Date(currentDate+'T12:00:00');
  document.getElementById('tableTitle').textContent    = 'Présences du jour';
  document.getElementById('tableSubtitle').textContent = dt.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const banner = document.getElementById('ferierBanner');
  banner.innerHTML = (data.length > 0 && data[0].ferie)
    ? '<div class="ferie-banner">★ Jour férié — les absences ne sont pas comptabilisées</div>' : '';
  renderJourTable(data);
  _reapplyFilter();
}

function renderJourTable(data) {
  const body = document.getElementById('tableBody');
  if (!data.length) { body.innerHTML = '<div class="loading-state">📭 Aucune donnée</div>'; return; }
  const dur  = m => (m > 0) ? `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}` : '<span class="td-empty"></span>';
  const bc   = s => ({Complet:'badge-complet',Incomplet:'badge-incomplet',Absent:'badge-absent',Férié:'badge-ferie',Exclu:'badge-exclu',Repos:'badge-repos',Garde:'badge-garde',Récup:'badge-recup'}[s]||'');
  const t    = v => v ? `<span class="td-time">${v.slice(0,5)}</span>` : '<span class="td-empty"></span>';
  const vide = '<span class="td-empty"></span>';

  let html = `<div style="overflow-x:auto"><table class="data-table"><thead><tr>
    <th>PRNO</th><th>Nom Prénom</th>
    <th>Arr. Mat</th><th>Dép. Mat</th>
    <th>Arr. APM</th><th>Dép. APM</th>
    <th>Durée</th><th style="color:#00BFA5">Contrat</th><th>Écart</th><th>Statut</th>
  </tr></thead><tbody>`;

  data.forEach(r => {
    const nh = !r.code_horaire;
    const ex = r.statut === 'Exclu';
    const duree   = nh ? vide : (r.reel_label && r.reel_label !== '—' ? r.reel_label : dur(r.minutes_reels||0));
    const contrat = nh ? '<span class="td-empty">N/A</span>' : (r.theorique_label|| '');
    const ecartC  = nh ? '#9AAABB' : (r.ecart_type==='manquant'?'#EF5350':r.ecart_type==='ok'?'#4CAF50':'#9AAABB');
    const ecart   = nh || ex ? vide : (r.ecart_label|| '');
    const rowSt   = nh ? 'opacity:0.45;background:repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(0,0,0,0.03) 4px,rgba(0,0,0,0.03) 8px);' : ex ? 'opacity:0.35;' : r.ferie ? 'opacity:0.6;' : '';
    const statut  = nh
      ? '<span class="badge" style="background:rgba(0,0,0,0.06);color:#9AAABB;border:1px solid rgba(0,0,0,0.07)">Sans horaire</span>'
      : `<span class="badge ${bc(r.statut)}">${r.statut}</span>`;
    const show = !ex;
    html += `<tr style="${rowSt}">
      <td class="td-prno">${r.prno}</td>
      <td class="td-name">${r.nom_prenom}</td>
      <td>${show ? t(r.arr_mat) : vide}</td>
      <td>${show ? t(r.dep_mat) : vide}</td>
      <td>${show ? t(r.arr_apm) : vide}</td>
      <td>${show ? t(r.dep_apm) : vide}</td>
      <td class="td-dur">${ex ? vide : duree}</td>
      <td class="td-dur" style="color:#00BFA5">${ex ? vide : contrat}</td>
      <td class="td-dur" style="color:${ecartC};font-weight:600">${ecart}</td>
      <td>${statut}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  body.innerHTML = html;
}

// ── VUE S-MOIS ────────────────────────────────────────────────────────────
async function loadSMois() {
  const releveParam = activeReleveId ? `&releve_id=${activeReleveId}` : '';
  const data = await (await fetch(`/api/periode?periode=s_mois&date=${currentDate}${releveParam}`)).json();
  allRowsData = data.employes || [];
  const dt = new Date(currentDate+'T12:00:00');
  const moisNom = dt.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const titre = activeReleveId ? `Vue S-Mois — Relevé #${activeReleveId}` : `Vue S-Mois — ${moisNom}`;
  document.getElementById('tableTitle').textContent    = titre;
  document.getElementById('tableSubtitle').textContent = `${data.date_debut.replace(/-/g,'/')} → ${data.date_fin.replace(/-/g,'/')} · cliquer sur une ligne pour voir le détail par jour`;
  document.getElementById('ferierBanner').innerHTML    = '';
  renderSMoisTable(data);
  _reapplyFilter();
}

function renderSMoisTable(data) {
  const body     = document.getElementById('tableBody');
  const employes = data.employes || [];
  if (!employes.length) { body.innerHTML='<div class="loading-state">📭 Aucune donnée</div>'; return; }
  const dates    = [...new Set(employes.flatMap(e => Object.keys(e.dates||{})))].sort();

  const semaines = [];
  let sem = [];
  dates.forEach(d => {
    const dow = new Date(d+'T12:00:00').getDay();
    if (dow === 1 && sem.length) { semaines.push(sem); sem = []; }
    sem.push(d);
  });
  if (sem.length) semaines.push(sem);

  let html = '<div class="periode-scroll"><table class="periode-table"><thead><tr>';
  html += '<th style="text-align:left;padding-left:14px">PRNO</th>';
  html += '<th style="text-align:left;padding-left:10px;min-width:150px">Nom Prénom</th>';
  semaines.forEach((s,i) => {
    const d0 = formatDateCourt(s[0]); const d1 = formatDateCourt(s[s.length-1]);
    html += `<th title="${s[0]} → ${s[s.length-1]}">S${i+1}<br><span style="font-size:9px;font-weight:400;opacity:0.65">${d0}→${d1}</span></th>`;
  });
  html += `<th style="background:#E8EBF4;color:#00BFA5;min-width:75px;border-left:2px solid rgba(0,191,165,0.2)">Contrat</th>`;
  html += `<th style="background:#E8EBF4;color:#5A6A82;min-width:75px">Durée</th>`;
  html += `<th style="background:#E8EBF4;min-width:70px">Écart</th>`;
  html += `<th style="background:#E8EBF4;color:#4CAF50;min-width:36px" title="Complets">✓</th>`;
  html += `<th style="background:#E8EBF4;color:#FFB300;min-width:36px" title="Incomplets">◑</th>`;
  html += `<th style="background:#E8EBF4;color:#EF5350;min-width:36px" title="Absents">✕</th>`;
  html += '</tr></thead><tbody>';

  employes.forEach(emp => {
    const rid = 'sm_' + emp.prno.replace(/\W/g,'_');
    const ec  = emp.ecart_type==='manquant'?'#EF5350':emp.ecart_type==='ok'?'#4CAF50':'#9AAABB';

    html += `<tr data-cat="${emp.categorie||'standard'}">`;
    html += `<td class="td-prno-col">${emp.prno}</td>`;
    html += `<td class="td-nom-col">${emp.nom_prenom}</td>`;

    semaines.forEach((s, i) => {
      const sts = s.map(d => (emp.dates||{})[d]||'Exclu');
      const nC  = sts.filter(x=>x==='Complet').length;
      const nI  = sts.filter(x=>x==='Incomplet').length;
      const nA  = sts.filter(x=>x==='Absent').length;
      const nEx = sts.filter(x=>x==='Exclu').length;
      const nF  = sts.filter(x=>x==='Férié').length;
      const cls = nA>0?'cel-absent':nI>0?'cel-incomplet':nC>0?'cel-complet':'cel-exclu';
      const lbl = nEx+nF===s.length ? (nF>0?`★${nF}`:'·')
        : [nC?`✓${nC}`:'',nI?`◑${nI}`:'',nA?`✕${nA}`:''].filter(Boolean).join(' ') || '·';
      const datesStr = s.join(',');
      html += `<td class="${cls}" style="font-size:11px;cursor:pointer"
        onclick="openSemaine('${rid}','${emp.prno}',${i},'${datesStr}')"
        title="Cliquer pour voir le détail de cette semaine">${lbl}</td>`;
    });

    html += `<td style="font-family:'DM Mono',monospace;font-size:11px;color:#00BFA5;background:#E8EBF4;border-left:2px solid rgba(0,191,165,0.2);font-weight:600">${emp.theorique_label|| ''}</td>`;
    html += `<td style="font-family:'DM Mono',monospace;font-size:11px;color:#5A6A82;background:#E8EBF4">${emp.reel_label|| ''}</td>`;
    html += `<td style="font-family:'DM Mono',monospace;font-size:11px;color:${ec};background:#E8EBF4;font-weight:600">${emp.ecart_label|| ''}</td>`;
    html += `<td style="color:#4CAF50;font-weight:700;text-align:center;background:#E8EBF4">${emp.nb_complet||0}</td>`;
    html += `<td style="color:#FFB300;font-weight:700;text-align:center;background:#E8EBF4">${emp.nb_incomplet||0}</td>`;
    html += `<td style="color:#EF5350;font-weight:700;text-align:center;background:#E8EBF4">${emp.nb_absent||0}</td>`;
    html += '</tr>';

    const ncol = 2 + semaines.length + 6;
    html += `<tr class="smois-detail-row" id="${rid}">
      <td colspan="${ncol}" style="padding:0;background:rgba(0,191,165,0.03);border-bottom:2px solid rgba(0,191,165,0.2)">
        <div id="${rid}_content"></div>
      </td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  body.innerHTML = html;
}

const _dayCache = {};

async function openSemaine(rid, prno, semIdx, datesStr) {
  const dates     = datesStr.split(',');
  const detailRow = document.getElementById(rid);
  const content   = document.getElementById(rid+'_content');
  if (!detailRow || !content) return;

  if (detailRow.classList.contains('open') && detailRow.dataset.semIdx === String(semIdx)) {
    detailRow.classList.remove('open');
    content.innerHTML = '';
    return;
  }

  detailRow.dataset.semIdx = semIdx;
  detailRow.classList.add('open');

  const d0 = formatDateCourt(dates[0]); const d1 = formatDateCourt(dates[dates.length-1]);
  content.innerHTML = `
    <div style="padding:7px 16px;background:#2A3347;color:white;font-size:11px;font-weight:600;display:flex;align-items:center;gap:12px">
      <span>📅 ${d0} → ${d1}</span>
      <button onclick="document.getElementById('${rid}').classList.remove('open');document.getElementById('${rid}_content').innerHTML=''"
        style="margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,0.3);border-radius:5px;color:white;font-size:10px;padding:2px 7px;cursor:pointer">✕</button>
    </div>
    <div id="${rid}_tbody_wrap"><div class="loading-state" style="padding:16px"><div class="spinner"></div></div></div>`;

  const dayResults = await Promise.all(
    dates.map(ds => {
      if (_dayCache[ds]) return Promise.resolve(_dayCache[ds]);
      return fetch(`/api/detail_jour?date=${ds}`)
        .then(r=>r.json())
        .then(d => { _dayCache[ds] = d; return d; })
        .catch(() => null);
    })
  );

  const dur  = m => (m > 0) ? `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}` : '<span class="td-empty"></span>';
  const bc   = s => ({Complet:'badge-complet',Incomplet:'badge-incomplet',Absent:'badge-absent',Férié:'badge-ferie',Exclu:'badge-exclu',Repos:'badge-repos',Garde:'badge-garde',Récup:'badge-recup'}[s]||'');
  const t    = v => v ? `<span style="font-family:'DM Mono',monospace">${v.slice(0,5)}</span>` : '<span class="td-empty"></span>';
  const vide = '<span class="td-empty"></span>';

  let html = `<div style="overflow-x:auto"><table class="data-table" style="width:100%;font-size:11px"><thead><tr>
    <th style="padding:7px 12px">Date</th>
    <th>Arr. Mat</th><th>Dép. Mat</th>
    <th>Arr. APM</th><th>Dép. APM</th>
    <th>Durée</th><th style="color:#00BFA5">Contrat</th>
    <th>Écart</th><th>Statut</th>
  </tr></thead><tbody>`;

  dates.forEach((ds, i) => {
    const dayData = dayResults[i];
    const emp     = dayData ? (dayData.employes||[]).find(e => e.prno === prno) : null;
    const statut  = emp ? emp.statut : 'Exclu';
    const nh      = !emp || !emp.code_horaire;
    const ex      = statut === 'Exclu';
    const ferie   = emp && emp.ferie;
    const rowSt   = ex ? 'opacity:0.4;' : ferie ? 'opacity:0.7;' : '';
    const duree   = nh ? vide : (emp.reel_label && emp.reel_label !== '—' ? emp.reel_label : dur(emp.minutes_reels||0));
    const contrat = nh ? vide : (emp.theorique_label|| '');
    const ecartC  = !emp ? '#9AAABB' : emp.ecart_type==='manquant'?'#EF5350':emp.ecart_type==='ok'?'#4CAF50':'#9AAABB';
    const ecart   = ex ? vide : (emp.ecart_label|| '');
    html += `<tr style="${rowSt}" onclick="openModal('${ds}')" title="Voir détail complet">
      <td style="padding:7px 12px;font-family:'DM Mono',monospace;color:#00BFA5;font-weight:600;cursor:pointer">${formatDateCourt(ds)}</td>
      <td>${ex?vide:t(emp.arr_mat)}</td>
      <td>${ex?vide:t(emp.dep_mat)}</td>
      <td>${ex?vide:t(emp.arr_apm)}</td>
      <td>${ex?vide:t(emp.dep_apm)}</td>
      <td class="td-dur">${ex?vide:duree}</td>
      <td class="td-dur" style="color:#00BFA5">${ex?vide:contrat}</td>
      <td class="td-dur" style="color:${ecartC};font-weight:600">${ecart}</td>
      <td><span class="badge ${bc(statut)}">${ferie?'★ Férié':statut}</span></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById(rid+'_tbody_wrap').innerHTML = html;
}

  const labels = { semaine:'Semaine', mois:'Mois' };

  renderPeriodeTable(data);

}

function renderPeriodeTable(data) {
  const body     = document.getElementById('tableBody');
  const employes = data.employes || [];
  if (!employes.length) { body.innerHTML='<div class="loading-state">📭 Aucune donnée</div>'; return; }
  const dates = [...new Set(employes.flatMap(e => Object.keys(e.dates||{})))].sort();

  let html = `<div class="periode-scroll"><table class="periode-table"><thead><tr>
    <th style="text-align:left;padding-left:14px">PRNO</th>
    <th style="text-align:left;padding-left:10px;min-width:150px">Nom Prénom</th>`;
  dates.forEach(d => {
    const isFerie = employes.length > 0 && (employes[0].dates||{})[d] === 'Férié';
    html += `<th class="${isFerie?'th-ferie':''}" onclick="openModal('${d}')" title="${d}">${formatDateCourt(d)}${isFerie?' ★':''}</th>`;
  });
  html += `<th style="background:#E8EBF4;color:#00BFA5;min-width:75px;border-left:2px solid rgba(0,191,165,0.2)">Contrat</th>
    <th style="background:#E8EBF4;color:#5A6A82;min-width:75px">Durée</th>
    <th style="background:#E8EBF4;min-width:75px">Écart</th>
    <th style="background:#E8EBF4;color:#4CAF50;min-width:36px" title="Complets">✓</th>
    <th style="background:#E8EBF4;color:#FFB300;min-width:36px" title="Incomplets">◑</th>
    <th style="background:#E8EBF4;color:#EF5350;min-width:36px" title="Absents">✕</th>
    <th style="background:#E8EBF4;min-width:36px" title="Fériés">★</th>`;
  html += '</tr></thead><tbody>';

  employes.forEach(emp => {
    html += `<tr data-cat="${emp.categorie||'standard'}"><td class="td-prno-col">${emp.prno}</td><td class="td-nom-col">${emp.nom_prenom}</td>`;
    dates.forEach(d => {
      const s   = (emp.dates||{})[d]||'Exclu';
      const cls = {Complet:'cel-complet',Incomplet:'cel-incomplet',Absent:'cel-absent',Férié:'cel-ferie',Exclu:'cel-exclu',Repos:'cel-repos',Garde:'cel-garde',Récup:'cel-recup'}[s]||'';
      const lbl = {Complet:'✓',Incomplet:'◑',Absent:'✕',Férié:'★',Exclu:'·',Repos:'R',Garde:'G',Récup:'Ru'}[s]|| '';
      const oc  = s !== 'Exclu' ? `onclick="openModal('${d}')"` : '';
      html += `<td class="${cls}" ${oc} title="${s} — ${d}">${lbl}</td>`;
    });
    const ec = emp.ecart_type==='manquant'?'#EF5350':emp.ecart_type==='ok'?'#4CAF50':'#9AAABB';
    html += `
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:#00BFA5;background:#E8EBF4;border-left:2px solid rgba(0,191,165,0.2);font-weight:600">${emp.theorique_label|| ''}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:#5A6A82;background:#E8EBF4">${emp.reel_label|| ''}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:${ec};background:#E8EBF4;font-weight:600">${emp.ecart_label|| ''}</td>
      <td style="color:#4CAF50;font-weight:700;text-align:center;background:#E8EBF4">${emp.nb_complet||0}</td>
      <td style="color:#FFB300;font-weight:700;text-align:center;background:#E8EBF4">${emp.nb_incomplet||0}</td>
      <td style="color:#EF5350;font-weight:700;text-align:center;background:#E8EBF4">${emp.nb_absent||0}</td>
      <td style="text-align:center;background:#E8EBF4">${emp.nb_ferie||0}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  body.innerHTML = html;
}

function _reapplyFilter() {
  const q   = document.getElementById('searchBox')?.value.trim();
  const cat = document.getElementById('filterCatDash')?.value;
  if (q || cat) filterTable();
}
function filterTable() {
  const q   = document.getElementById('searchBox').value.toLowerCase().trim();
  const cat = (document.getElementById('filterCatDash')?.value || '');
  if (currentTab === 'jour') {
    renderJourTable(allRowsData.filter(r => {
      if (cat && (r.categorie || 'standard') !== cat) return false;
      if (!q) return true;
      const heures = [r.arr_mat, r.dep_mat, r.arr_apm, r.dep_apm]
        .filter(Boolean).map(h => h.slice(0,5)).join(' ');
      return (r.prno + ' ' + r.nom_prenom + ' ' + heures + ' ' + (r.statut||'')).toLowerCase().includes(q);
    }));
    return;
  }
  document.querySelectorAll('.periode-table tbody tr').forEach(row => {
    if (row.classList.contains('smois-detail-row')) return;
    const okCat = !cat || (row.dataset.cat || 'standard') === cat;
    const okTxt = !q   || row.textContent.toLowerCase().includes(q);
    row.style.display = (okCat && okTxt) ? '' : 'none';
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────
let _modalPrevFocus = null;

async function openModal(ds) {
  const overlay = document.getElementById('modalOverlay');
  _modalPrevFocus = document.activeElement;
  overlay.classList.add('open');
  // Focus sur le bouton fermer dès l'ouverture
  setTimeout(() => { document.getElementById('modalClose')?.focus(); }, 50);
  document.getElementById('modalDate').textContent  = formatDateCourt(ds);
  document.getElementById('modalTitle').textContent = new Date(ds+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('modalBody').innerHTML    = '<div class="loading-state"><div class="spinner"></div></div>';
  ['mStatTotal','mStatComplets','mStatIncomplets','mStatAbsents'].forEach(id => document.getElementById(id).textContent = '');
  try {
    const data = await (await fetch(`/api/detail_jour?date=${ds}`)).json();
    document.getElementById('mStatTotal').textContent      = data.stats.total;
    document.getElementById('mStatComplets').textContent   = data.stats.complets;
    document.getElementById('mStatIncomplets').textContent = data.stats.incomplets;
    document.getElementById('mStatAbsents').textContent    = data.stats.absents;
    const dur = m => (m > 0) ? `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}` : '<span class="td-empty"></span>';
    const bc  = s => ({Complet:'badge-complet',Incomplet:'badge-incomplet',Absent:'badge-absent',Férié:'badge-ferie',Exclu:'badge-exclu',Repos:'badge-repos',Garde:'badge-garde',Récup:'badge-recup'}[s]||'');
    let html = '';
    if (data.stats.ferie) html += '<div class="ferie-banner" style="margin:12px 16px 0">★ Jour férié</div>';
    html += `<div style="overflow-x:auto"><table class="data-table"><thead><tr>
      <th>PRNO</th><th>Nom Prénom</th>
      <th>Arr. Mat</th><th>Dép. Mat</th>
      <th>Arr. APM</th><th>Dép. APM</th>
      <th>Durée</th><th style="color:#00BFA5">Contrat</th><th>Écart</th><th>Statut</th>
    </tr></thead><tbody>`;
    const tM   = v => v ? `<span class="td-time">${v.slice(0,5)}</span>` : '<span class="td-empty"></span>';
    const vM   = '<span class="td-empty"></span>';
    (data.employes||[]).forEach(r => {
      const nh  = !r.code_horaire;
      const ex  = r.statut === 'Exclu';
      const duree  = nh ? vM : (r.reel_label && r.reel_label !== '—' ? r.reel_label : dur(r.minutes_reels||0));
      const ec  = nh ? '#9AAABB' : (r.ecart_type==='manquant'?'#EF5350':r.ecart_type==='ok'?'#4CAF50':'#9AAABB');
      const rst = nh ? 'opacity:0.45;background:repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(0,0,0,0.03) 4px,rgba(0,0,0,0.03) 8px);' : ex ? 'opacity:0.35;' : r.ferie ? 'opacity:0.6;' : '';
      const show = !ex;
      html += `<tr style="${rst}">
        <td class="td-prno">${r.prno}</td><td class="td-name">${r.nom_prenom}</td>
        <td>${show ? tM(r.arr_mat) : vM}</td>
        <td>${show ? tM(r.dep_mat) : vM}</td>
        <td>${show ? tM(r.arr_apm) : vM}</td>
        <td>${show ? tM(r.dep_apm) : vM}</td>
        <td class="td-dur">${ex||nh ? vM : duree}</td>
        <td class="td-dur" style="color:#00BFA5">${ex||nh ? vM : (r.theorique_label|| '')}</td>
        <td class="td-dur" style="color:${ec};font-weight:600">${ex||nh ? vM : (r.ecart_label|| '')}</td>
        <td>${nh?'<span class="badge" style="background:rgba(0,0,0,0.06);color:#9AAABB;border:1px solid rgba(0,0,0,0.07)">Sans horaire</span>':`<span class="badge ${bc(r.statut)}">${r.statut}</span>`}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    document.getElementById('modalBody').innerHTML = html;
  } catch(e) { document.getElementById('modalBody').innerHTML='<div class="loading-state">Erreur</div>'; }
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  // Redonner le focus à l'élément qui a ouvert la modal
  if (_modalPrevFocus) { _modalPrevFocus.focus(); _modalPrevFocus = null; }
}

function closeModalOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadStats();
loadData();
loadTopbarReleves();
const _wrap = document.getElementById('releveSelectorWrap');
if (_wrap) _wrap.style.display = 'none';
setInterval(() => { loadStats(); if (currentTab === 'jour') loadData(); }, 120000);
